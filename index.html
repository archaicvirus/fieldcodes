<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Field Codes</title>

  <link rel="manifest" href="./manifest.json?v=6">
  <meta name="theme-color" content="#0b0c10">

  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <header class="app-header">
    <div class="title-row">
      <h1 class="app-title">Field Codes</h1>
      <button id="settingsBtn" class="icon-btn" type="button" aria-label="Settings">⚙</button>
    </div>

    <div class="search-row">
      <input id="searchInput" class="search-input" type="search" placeholder="Search..." autocomplete="off">
    </div>

    <div class="picker-row">
      <select id="codeListSelect" class="picker-select" aria-label="Code list selection"></select>
    </div>
  </header>

  <main class="app-main">
    <div class="table-wrap" role="region" aria-label="Field codes table">
      <div class="table-scroll">
        <table class="data-table" id="dataTable">
          <colgroup id="tableColGroup"></colgroup>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="modalOverlay" class="modal-overlay" hidden></div>

  <div id="settingsModal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-card">
      <div class="modal-header">
        <div id="settingsTitle" class="modal-title">Settings</div>
        <button id="closeModalBtn" class="icon-btn" type="button" aria-label="Close">✕</button>
      </div>

      <div class="modal-body">
        <div class="modal-hint">Search in columns</div>
        <div id="searchSettingsList" class="settings-list"></div>

        <div class="modal-actions">
          <button id="enableAllBtn" class="btn" type="button">Enable all</button>
          <button id="disableAllBtn" class="btn" type="button">Disable all</button>
        </div>

        <div class="modal-divider"></div>

        <div class="modal-hint">Show columns</div>
        <div id="showSettingsList" class="settings-list"></div>

        <div class="modal-actions">
          <button id="showAllBtn" class="btn" type="button">Show all</button>
          <button id="hideAllBtn" class="btn" type="button">Hide all</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js?v=6"></script>
</body>
</html>
